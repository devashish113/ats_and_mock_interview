# Docker Compose for CareerPrep AI (ATS Resume & Mock Interview)
version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ats-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - MAX_FILE_SIZE_MB=10
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/generated:/app/generated
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=http://13.205.182.228:8000
    container_name: ats-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads:
  generated:
